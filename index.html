<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>সমিতি ম্যানেজমেন্ট PRO</title>

<!-- Firebase COMPAT (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f4f4f4;padding:15px}
.box{max-width:950px;margin:auto;background:#fff;padding:15px;border-radius:10px}
input,button{padding:8px;margin:5px}
button{cursor:pointer}
.member{border-bottom:1px solid #ddd;padding:10px}
.paid{color:green;font-weight:bold}
.unpaid{color:red;font-weight:bold}
.topbar{display:flex;gap:10px;flex-wrap:wrap}
.hidden{display:none}
.card{background:#eef;padding:10px;margin:5px;border-radius:8px}
</style>
</head>

<body>

<div class="box">

<h2>🟢 ইসলামী ছাত্র কল্যাণ সমিতি (PRO)</h2>

<!-- LOGIN -->
<div id="loginBox">
  <h3>🔐 Admin Login</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="panel" class="hidden">

<div class="topbar">
  <input id="name" placeholder="নাম">
  <input id="code" placeholder="কোড">
  <input id="phone" placeholder="মোবাইল">
  <button onclick="addMember()">➕ Add</button>

  <input id="search" placeholder="Search" onkeyup="render()">
</div>

<!-- DASHBOARD STATS -->
<div class="card" id="stats"></div>

<hr>

<div id="list"></div>

<button onclick="logout()">Logout</button>
</div>

</div>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const months = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];

let members = [];

/* 🔐 LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .then(()=>{
    loginBox.classList.add("hidden");
    panel.classList.remove("hidden");
    loadData();
  })
  .catch(()=>alert("Login failed"));
}

/* 🚪 LOGOUT */
function logout(){
  auth.signOut();
  location.reload();
}

/* ➕ ADD MEMBER */
function addMember(){
  db.collection("members").add({
    name:name.value,
    code:code.value,
    phone:phone.value,
    payments:{
      jan:false,feb:false,mar:false,apr:false,
      may:false,jun:false,jul:false,aug:false,
      sep:false,oct:false,nov:false,dec:false
    }
  });

  name.value="";code.value="";phone.value="";
}

/* 📡 LOAD DATA */
function loadData(){
  db.collection("members").onSnapshot(snap=>{
    members = [];
    snap.forEach(doc=>{
      members.push({id:doc.id,...doc.data()});
    });
    render();
  });
}

/* 📊 DASHBOARD */
function updateStats(){
  let total = members.length;
  let paid = 0;

  members.forEach(m=>{
    if(Object.values(m.payments).filter(v=>v).length>0) paid++;
  });

  stats.innerHTML = `
    👥 Total Members: ${total}<br>
    💰 Active Paid Members: ${paid}<br>
    ❗ Unpaid: ${total-paid}
  `;
}

/* 📄 RENDER */
function render(){
  let key = search.value?.toLowerCase() || "";

  let html = "";

  members
  .filter(m=>m.name.toLowerCase().includes(key) || m.code.includes(key))
  .forEach(m=>{

    html += `
    <div class="member">
      <b>[${m.code}] ${m.name}</b><br>
      📱 ${m.phone}<br><br>

      ${months.map(mon=>`
        <button onclick="toggle('${m.id}','${mon}',${m.payments[mon]})">
          ${mon.toUpperCase()} : ${m.payments[mon] ? "PAID":"UNPAID"}
        </button>
      `).join('')}

      <br><br>
      <button onclick="del('${m.id}')">❌ Delete</button>
    </div>
    `;
  });

  list.innerHTML = html;

  updateStats();
}

/* 🔁 TOGGLE PAYMENT */
function toggle(id,mon,status){
  let obj = {};
  obj[`payments.${mon}`] = !status;
  db.collection("members").doc(id).update(obj);
}

/* ❌ DELETE */
function del(id){
  db.collection("members").doc(id).delete();
}

/* AUTO LOGIN CHECK */
auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.classList.add("hidden");
    panel.classList.remove("hidden");
    loadData();
  }
});
</script>

</body>
  </html>
